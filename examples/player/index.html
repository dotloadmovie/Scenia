<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AS3 Wasm sketch bundle player</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0f172a;
        color: #e2e8f0;
        font-family: system-ui, sans-serif;
      }
      #app {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 16px;
        box-sizing: border-box;
      }
      #status {
        position: fixed;
        left: 12px;
        bottom: 12px;
        font-size: 12px;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <p id="status">Loading sketch bundle…</p>
    <script type="module">
      import { loadSketchBundle } from "./runtime-player.js";

      const status = document.getElementById("status");
      const mount = document.getElementById("app");

      loadSketchBundle("./sketch.bundle.json", { mount })
        .then((runtime) => {
          status.textContent = `Running: ${runtime.canvas.width}×${runtime.canvas.height}`;
        })
        .catch((error) => {
          status.textContent = "Failed to load sketch bundle.";
          console.error(error);
        });
    </script>
  </body>
</html>
